<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寒武纪 1.3 处理模型输出 Dashboard</title>
    <style>
      :root {
        --bg: #f6f3ea;
        --panel: #fffdf8;
        --line: #d9ccb6;
        --text: #1f1b17;
        --muted: #6c6457;
        --accent: #1b5f75;
        --accent-2: #a64f2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "Source Han Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(27,95,117,0.10), transparent 26%),
          radial-gradient(circle at top right, rgba(166,79,42,0.10), transparent 22%),
          var(--bg);
      }
      .shell { max-width: 1460px; margin: 0 auto; padding: 26px 20px 42px; }
      .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
      h1 { margin: 8px 0 10px; font-size: clamp(30px, 5vw, 58px); line-height: 0.95; }
      .sub { max-width: 980px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
      .grid { display: grid; grid-template-columns: 430px minmax(0, 1fr); gap: 20px; }
      .panel { background: rgba(255,253,248,0.94); border: 1px solid var(--line); border-radius: 24px; padding: 18px; box-shadow: 0 14px 44px rgba(50,30,12,0.07); }
      h2 { margin: 0 0 12px; font-size: 18px; }
      .status { padding: 12px 14px; border-radius: 16px; margin-bottom: 14px; background: #efe6d4; }
      .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
      button { border: 0; border-radius: 999px; padding: 10px 14px; cursor: pointer; font-weight: 700; color: white; background: var(--accent); }
      button.secondary { background: var(--accent-2); }
      button.ghost { background: #f1eadc; color: var(--text); }
      label { display: grid; gap: 6px; margin-bottom: 12px; font-size: 13px; }
      input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; font: inherit; color: var(--text); background: white; }
      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .button-row { display: flex; gap: 10px; margin-top: 14px; }
      .run-list { display: grid; gap: 10px; }
      .run-card { border: 1px solid var(--line); border-radius: 16px; padding: 12px; background: #fffdfa; }
      .run-meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
      .artifact-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
      .artifact-list a { color: var(--accent); font-weight: 700; text-decoration: none; }
      pre { margin: 0; padding: 14px; background: #16120f; color: #f8f4ec; border-radius: 16px; overflow: auto; font-size: 12px; line-height: 1.5; }
      .preview { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; min-height: 420px; background: white; margin-bottom: 14px; }
      .preview iframe { width: 100%; height: 420px; border: 0; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .preset-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="eyebrow">Cambricon Indicator 1.3</div>
      <h1>处理模型输出 Dashboard</h1>
      <div class="sub">
        这套页面面向 `5.1.9 训练任务处理模型输出测试` 和 `5.1.10 推理任务处理模型输出测试`。
        页面会生成执行模型 JSON、资源映射说明、TP 并行划分关系、microbatch 逻辑说明和 DAG 图。
      </div>
      <section class="grid">
        <div class="panel">
          <h2>构建配置</h2>
          <div class="status" id="status-box">页面已就绪。</div>
          <div class="preset-grid">
            <button class="ghost" data-preset="infer_single">推理单卡</button>
            <button class="ghost" data-preset="infer_dual">推理双卡</button>
            <button class="ghost" data-preset="train_single">训练单卡</button>
            <button class="ghost" data-preset="train_dual">训练双卡</button>
          </div>
          <form id="run-form">
            <div class="two-col">
              <label>任务类型<select id="task"><option value="inference">inference</option><option value="training">training</option></select></label>
              <label>规模<select id="scale"><option value="single">single</option><option value="dual">dual</option></select></label>
            </div>
            <label>宿主机模型目录<input id="host_model_dir"/></label>
            <label>Docker 镜像<input id="image"/></label>
            <label>Prompt<textarea id="prompt"></textarea></label>
            <div class="two-col">
              <label>physical_devices<input id="physical_devices"/></label>
              <label>dtype<select id="dtype"><option value="bf16">bf16</option><option value="fp16">fp16</option></select></label>
            </div>
            <div class="two-col">
              <label>world_size<input id="world_size" type="number" min="1"/></label>
              <label>tp_size<input id="tp_size" type="number" min="1"/></label>
            </div>
            <label>microbatch_count<input id="microbatch_count" type="number" min="1"/></label>
            <div class="two-col">
              <label>microbatch_size<input id="microbatch_size" type="number" min="1"/></label>
              <label>sequence_length<input id="sequence_length" type="number" min="1"/></label>
            </div>
            <div class="button-row">
              <button type="submit">生成处理模型</button>
              <button class="secondary" type="button" id="refresh-btn">刷新列表</button>
            </div>
          </form>
        </div>
        <div class="panel">
          <h2>构建记录</h2>
          <div class="run-list" id="run-list"></div>
          <h2 style="margin-top: 22px;">构建详情</h2>
          <div class="artifact-list" id="artifact-list"></div>
          <div class="preview" id="preview-box"><iframe id="preview-frame"></iframe></div>
          <pre id="detail-box">还没有选中构建记录。</pre>
        </div>
      </section>
    </div>
    <script>
      const state = { presets: null, runs: [], selectedRunId: null };
      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }
      function setStatus(text) { document.getElementById("status-box").textContent = text; }
      function applyPayload(payload) {
        for (const [key, value] of Object.entries(payload)) {
          const element = document.getElementById(key);
          if (element) element.value = value;
        }
      }
      function collectPayload() {
        return {
          task: document.getElementById("task").value,
          scale: document.getElementById("scale").value,
          host_model_dir: document.getElementById("host_model_dir").value,
          image: document.getElementById("image").value,
          prompt: document.getElementById("prompt").value,
          physical_devices: document.getElementById("physical_devices").value,
          dtype: document.getElementById("dtype").value,
          world_size: Number(document.getElementById("world_size").value),
          tp_size: Number(document.getElementById("tp_size").value),
          microbatch_count: Number(document.getElementById("microbatch_count").value),
          microbatch_size: Number(document.getElementById("microbatch_size").value),
          sequence_length: Number(document.getElementById("sequence_length").value)
        };
      }
      function renderRuns() {
        const box = document.getElementById("run-list");
        box.innerHTML = "";
        for (const run of state.runs) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "run-card";
          button.style.textAlign = "left";
          button.innerHTML = `<strong>${run.payload.task} / ${run.payload.scale}</strong><div class="run-meta">run_id=${run.run_id} | status=${run.status}</div><div class="run-meta">${run.output_dir || ""}</div>`;
          button.addEventListener("click", () => { state.selectedRunId = run.run_id; renderDetail(run); });
          box.appendChild(button);
        }
      }
      function renderDetail(run) {
        const artifactList = document.getElementById("artifact-list");
        artifactList.innerHTML = "";
        let previewTarget = "";
        for (const artifact of (run.artifacts || [])) {
          const link = document.createElement("a");
          link.href = `/api/runs/${run.run_id}/artifacts/${artifact.path}`;
          link.textContent = artifact.name;
          link.target = "_blank";
          artifactList.appendChild(link);
          if (!previewTarget && (artifact.name.endsWith(".svg") || artifact.name.endsWith("index.html"))) {
            previewTarget = link.href;
          }
        }
        document.getElementById("preview-frame").src = previewTarget || "about:blank";
        document.getElementById("detail-box").textContent = JSON.stringify({
          payload: run.payload,
          summary: run.summary,
          error: run.error,
          output_dir: run.output_dir,
          stdout_tail: (run.stdout || "").slice(-6000),
          stderr_tail: (run.stderr || "").slice(-6000)
        }, null, 2);
      }
      async function refreshRuns() {
        const data = await fetchJson("/api/runs");
        state.runs = data.runs || [];
        renderRuns();
        if (state.selectedRunId) {
          const matched = state.runs.find((item) => item.run_id === state.selectedRunId);
          if (matched) renderDetail(matched);
        }
      }
      async function boot() {
        const data = await fetchJson("/api/defaults");
        state.presets = data.presets;
        applyPayload(data.defaults);
        document.querySelectorAll("[data-preset]").forEach((button) => {
          button.addEventListener("click", () => {
            applyPayload(state.presets[button.dataset.preset]);
            setStatus(`已套用 ${button.dataset.preset}`);
          });
        });
        document.getElementById("run-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          setStatus("正在生成处理模型...");
          try {
            const result = await fetchJson("/api/runs", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify(collectPayload())
            });
            setStatus(`已提交 run_id=${result.run_id}`);
            await refreshRuns();
          } catch (error) {
            setStatus(`提交失败：${error.message}`);
          }
        });
        document.getElementById("refresh-btn").addEventListener("click", refreshRuns);
        await refreshRuns();
        setInterval(refreshRuns, 4000);
      }
      boot().catch((error) => setStatus(`初始化失败：${error.message}`));
    </script>
  </body>
</html>
